services:
  server:
    build: ./server
    restart: always
    ports:
      - "3001:3001"
    env_file:
      - .env
      - ./server/.env
    networks:
      - organize-net

  client:
    build:
      context: ./client
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
        - VITE_API_URL=${VITE_API_URL}
    restart: always
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - organize-net

  agent:
    build: ./agent
    restart: always
    env_file:
      - .env
      - ./agent/.env
    depends_on:
      - server
    networks:
      - organize-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  organize-net:
    driver: bridge
